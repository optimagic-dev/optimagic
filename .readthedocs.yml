---
version: 2
build:
  os: ubuntu-24.04
  tools:
    python: '3.12'
  jobs:
    create_environment:
      - asdf plugin add pixi
      - asdf install pixi latest
      - asdf global pixi latest
    post_build:
      - pixi run -e docs build-docs
      - mkdir --parents $READTHEDOCS_OUTPUT/html/
      - cp -a docs/build/html/. "$READTHEDOCS_OUTPUT/html" && rm -r docs/build
